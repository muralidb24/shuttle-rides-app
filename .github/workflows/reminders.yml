name: Send ride reminders

on:
  schedule:
    # Two runs a day, ~6 hours apart. GitHub's scheduled triggers are
    # best-effort and occasionally run late or get skipped entirely during
    # high load on shared runners (this has happened in practice - one day's
    # 13:00 UTC run silently never fired). The function is idempotent per day
    # (it checks last_reminder_sent before sending), so a second run only
    # ever costs a no-op on days the first one worked - it never double-sends.
    # Adjust both to land in the morning/evening in your timezone.
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-reminders edge function
        run: |
          curl -sS -X POST "${{ secrets.SUPABASE_FUNCTIONS_URL }}/send-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail
