name: Send ride reminders

on:
  schedule:
    # Two runs a day - 6 AM and 1 PM Eastern (currently EDT, UTC-4; these
    # fixed UTC times will drift by an hour relative to Eastern across the
    # DST boundary - adjust if that matters to you). GitHub's scheduled
    # triggers are best-effort and occasionally run late or get skipped
    # entirely during high load on shared runners (this has happened in
    # practice). The function is idempotent per day (it checks
    # last_reminder_sent before sending), so a second run only ever costs a
    # no-op on days the first one worked - it never double-sends. This is
    # also why the pg_cron backup in supabase/migrations exists - it fires
    # on the exact same schedule but isn't subject to GitHub's delays.
    - cron: '0 10 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-reminders edge function
        run: |
          curl -sS -X POST "${{ secrets.SUPABASE_FUNCTIONS_URL }}/send-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail
